# RAGChecker Presets
# Jeder Eintrag definiert einen Parametersatz für einen Testlauf.
# Felder:
#   label          – eindeutiger Name des Presets (wird als Run-label verwendet)
#   TOP_K          – wird als dediziertes "Top-K"-Feld im Report angezeigt
#   alle anderen   – erscheinen als "Parameter" im Report
#
# ─────────────────────────────────────────────────────────────────────────────
# ÜBERSICHT ALLER PRESETS
# ─────────────────────────────────────────────────────────────────────────────
#
#  Frühere Läufe:
#    baseline                      – Referenzwerte (COSINE_THRESHOLD=0.5, TOP_K=50, VECTOR)
#    prio1-COSINE_THRESHOLD-topk             – COSINE_THRESHOLD=0.2, TOP_K=25, CHUNK_TOP_K=10, tokens=6000
#    prio1-kg-weight               – wie oben, aber KG_CHUNK_PICK_METHOD=WEIGHT
#
#  Gruppe 1 – COSINE_THRESHOLD_THRESHOLD sweep (Baseline: 0.5)
#    sweep-COSINE_THRESHOLD-0.1              – sehr permissiv, viele Treffer
#    sweep-COSINE_THRESHOLD-0.3              – leicht relaxed
#    sweep-COSINE_THRESHOLD-0.7              – strenger als Baseline
#    sweep-COSINE_THRESHOLD-0.9              – sehr streng, wenige Treffer
#
#  Gruppe 2 – KG_CHUNK_PICK_METHOD (isoliert, Baseline: VECTOR)
#    sweep-method-weight           – WEIGHT, alles andere = Baseline
#
#  Gruppe 3 – TOP_K sweep (Baseline: 50)
#    sweep-topk-25                 – weniger Kandidaten
#    sweep-topk-35                 – moderater Mittelwert
#    sweep-topk-100                – breite Abdeckung
#
#  Gruppe 4 – CHUNK_TOP_K sweep (Baseline: 14)
#    sweep-chunktopk-5             – wenige Chunks
#    sweep-chunktopk-10            – leicht reduziert
#    sweep-chunktopk-20            – mehr Chunks
#
#  Gruppe 5 – RELATED_CHUNK_NUMBER sweep (Baseline: 14)
#    sweep-related-7               – halbe Anzahl
#    sweep-related-25              – erhöhte Anzahl
#
#  Gruppe 6 – MAX_ENTITY/MAX_RELATION_TOKENS sweep (Baseline: 8192)
#    sweep-tokens-4096             – kompakter Kontext
#    sweep-tokens-16384            – erweiterter Kontext
#
#  Gruppe 7 – Kombinationen (basierend auf Vorannahmen)
#    combo-COSINE_THRESHOLD0.2-weight        – COSINE_THRESHOLD=0.2 + WEIGHT (Method-Effekt auf niedriger Schwelle)
#    combo-COSINE_THRESHOLD0.2-topk25-chunk10 – COSINE_THRESHOLD=0.2 + TOP_K=25 + CHUNK_TOP_K=10 (ohne Token-Reduktion)
#    combo-COSINE_THRESHOLD0.3-topk35        – COSINE_THRESHOLD=0.3 + TOP_K=35 (moderater Mittelweg)
#    combo-maxabdeckung            – COSINE_THRESHOLD=0.1 + TOP_K=75 + CHUNK_TOP_K=20 (maximale Abdeckung)
#    combo-prio1-weight-fulltokens – prio1-kg-weight, aber RELATED_CHUNK_NUMBER=14 (Baseline)
#
# ─────────────────────────────────────────────────────────────────────────────

# ─── Baseline ────────────────────────────────────────────────────────────────
- label: "baseline"
  env:
    COSINE_THRESHOLD: "0.5"
    TOP_K: "50"
    CHUNK_TOP_K: "14"
    MAX_ENTITY_TOKENS: "8192"
    MAX_RELATION_TOKENS: "8192"
    RELATED_CHUNK_NUMBER: "14"
    KG_CHUNK_PICK_METHOD: "VECTOR"
    RERANK_BINDING: "null"
    MIN_RERANK_SCORE: "0.2"

# ─── Frühere Presets ─────────────────────────────────────────────────────────
- label: "prio1-COSINE_THRESHOLD-topk"
  env: COSINE_THRESHOLD: "0.2"
    TOP_K: "25"
    CHUNK_TOP_K: "10"
    MAX_ENTITY_TOKENS: "6000"
    MAX_RELATION_TOKENS: "6000"
    RELATED_CHUNK_NUMBER: "10"
    KG_CHUNK_PICK_METHOD: "VECTOR"
    RERANK_BINDING: "null"
    MIN_RERANK_SCORE: "0.2"

- label: "prio1-kg-weight"
